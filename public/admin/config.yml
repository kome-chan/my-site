backend:
  name: github
  repo: kome-chan/my-site
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: ja

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "slider"
    label: "ヒーロー画像スライダー"
    folder: "content/slider"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{random}}"
    fields:
      - { label: "表示順", name: "order", widget: "number", default: 1, min: 1, hint: "数字が小さい順に表示されます" }
      - { label: "画像", name: "image", widget: "image", required: true }
      - { label: "代替テキスト(alt)", name: "alt", widget: "string", required: false, hint: "画像の説明文。アクセシビリティのため推奨" }

  - name: "news"
    label: "お知らせ"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{hash}}"
    fields:
      - { label: "日付", name: "date", widget: "datetime" }
      - label: "カテゴリ"
        name: "category"
        widget: "select"
        options: ["イベント", "お知らせ", "レポート"]
      - { label: "タイトル", name: "title", widget: "string" }
      - { label: "本文", name: "body", widget: "markdown" }
      - { label: "サムネイル", name: "thumbnail", widget: "image", required: false }

  - name: "schedule"
    label: "今後の予定"
    folder: "content/schedule"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{hash}}"
    fields:
      - { label: "日付", name: "date", widget: "datetime" }
      - { label: "イベント名", name: "title", widget: "string" }
      - { label: "補足", name: "note", widget: "text" }
      - { label: "詳細", name: "body", widget: "markdown", required: false }

  - name: "settings"
    label: "サイト設定"
    files:
      - file: "content/settings/home.yml"
        label: "トップページ"
        name: "home"
        fields:
          - { label: "キャッチコピー", name: "catchphrase", widget: "text", default: "知を磨き、\n次代の経営を拓く。", hint: "改行が表示に反映されます" }
          - { label: "創立年表記", name: "since", widget: "string", default: "SINCE 1952" }
          - { label: "サブテキスト", name: "subtext", widget: "text", default: "横浜国立大学経営者会は、卒業生有志により設立された経営者・実務家のための学びと交流の場です。半世紀以上にわたり、経営の知見を深め合い、社会への責任を果たす人材を輩出してきました。", hint: "キャッチコピーの下に表示される説明文" }

      - file: "content/settings/about.yml"
        label: "会の概要"
        name: "about"
        fields:
          - { label: "会の概要文", name: "description", widget: "text", default: "" }
          - { label: "会員数", name: "memberCount", widget: "string", default: "約100名" }
          - { label: "所在地", name: "location", widget: "string", default: "横浜市保土ケ谷区" }
          - { label: "設立年", name: "establishedYear", widget: "string", default: "1952年" }

      - file: "content/settings/history.yml"
        label: "設立経緯(タイムライン)"
        name: "history"
        fields:
          - label: "年表"
            name: "items"
            widget: "list"
            summary: "{{fields.year}} - {{fields.event}}"
            fields:
              - { label: "年", name: "year", widget: "string", hint: "例: 1952年" }
              - { label: "出来事", name: "event", widget: "string" }

      - file: "content/settings/chairman.yml"
        label: "会長メッセージ"
        name: "chairman"
        fields:
          - { label: "会長名", name: "name", widget: "string", default: "" }
          - { label: "役職", name: "title", widget: "string", default: "会長", required: false }
          - { label: "顔写真", name: "photo", widget: "image", required: false, hint: "正方形・500px以上推奨" }
          - { label: "メッセージ本文", name: "message", widget: "text", default: "", hint: "改行も反映されます" }

      - file: "content/settings/activities.yml"
        label: "活動内容"
        name: "activities"
        fields:
          - label: "活動カテゴリ"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            max: 6
            fields:
              - { label: "タイトル", name: "title", widget: "string", hint: "例: 講義 / 交流 / 成長" }
              - { label: "英語表記", name: "subtitle", widget: "string", required: false, hint: "例: LECTURE" }
              - { label: "説明文", name: "description", widget: "text" }

      - file: "content/settings/join.yml"
        label: "入会案内"
        name: "join"
        fields:
          - { label: "入会案内文", name: "description", widget: "text", default: "" }
          - { label: "入会フォームURL", name: "formUrl", widget: "string", default: "#", required: false, hint: "Googleフォーム等のURL" }

      - file: "content/settings/sns.yml"
        label: "SNSリンク"
        name: "sns"
        fields:
          - { label: "Facebook URL", name: "facebook", widget: "string", default: "#", required: false }
          - { label: "X(Twitter) URL", name: "twitter", widget: "string", default: "#", required: false }

      - file: "content/settings/footer.yml"
        label: "フッター・全般"
        name: "footer"
        fields:
          - { label: "コピーライト表記", name: "copyright", widget: "string", default: "© 和田町会 横浜国立大学経営者会" }

  - name: "members"
    label: "役員・会員紹介"
    description: "役員・会員紹介を管理します。お顔写真を登録した方は上段に大きく(4名程度を推奨)、未登録の方は下段に一覧表示されます。"
    folder: "content/members"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{random}}"
    summary: "{{fields.name}} - {{fields.role}}"
    sortable_fields:
      - name
      - role
    view_groups:
      - label: "役職"
        field: role
    fields:
      - { label: "お名前", name: "name", widget: "string" }
      - { label: "役職", name: "role", widget: "string", required: false, hint: "例: 会長 / 副会長 / 理事" }
      - { label: "ご所属企業名", name: "company", widget: "string", required: false }
      - { label: "卒業年度", name: "graduationYear", widget: "string", required: false, hint: "例: 1985年卒" }
      - { label: "お顔写真", name: "photo", widget: "image", required: false, hint: "写真を登録すると「写真あり」として上段(4名まで目立つ表示)に、未登録の場合は下段(写真なし一覧)に表示されます。写真ありメンバーは4名を目安にすることをおすすめします。" }
      - { label: "企業WebサイトURL", name: "companyUrl", widget: "string", required: false, hint: "https:// から入力" }
